<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Estoque 360°</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 22px; }

        .modelo-btn {
            width: 100%; background: #ffffff; border: 1px solid #ddd;
            padding: 18px; margin-bottom: 10px; border-radius: 8px;
            text-align: left; font-size: 16px; font-weight: bold;
            color: #2c3e50; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
            text-transform: uppercase;
        }

        .modelo-btn.active::after { content: '▲'; font-size: 12px; color: #999; }
        .modelo-btn::after { content: '▼'; font-size: 12px; color: #999; }

        .lista-carros { 
            display: none; background: #fff; margin-top: -10px;
            margin-bottom: 15px; border: 1px solid #ddd; border-top: none;
            border-radius: 0 0 8px 8px; overflow: hidden;
        }

        .versao-titulo {
            background: #f8f9fa; padding: 10px 20px;
            font-size: 11px; font-weight: bold; color: #007bff;
            text-transform: uppercase; border-left: 4px solid #007bff;
        }

        /* Estilo do Item e Botões Centralizados */
        .carro-item { 
            padding: 15px 20px; border-bottom: 1px solid #eee;
            display: flex; flex-direction: column; gap: 10px;
        }

        .carro-info {
            font-size: 13px; text-transform: uppercase; font-weight: 600;
            color: #555; text-align: center; margin-bottom: 5px;
        }

        .botoes-acao {
            display: flex; gap: 8px; width: 100%;
        }

        .btn {
            flex: 1; text-align: center; text-decoration: none; 
            padding: 10px; border-radius: 6px; font-size: 11px; 
            font-weight: bold; cursor: pointer; border: none;
            transition: 0.2s;
        }

        .btn-copiar { background: #28a745; color: white; }
        .btn-ver { background: #007bff; color: white; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }

        /* Ajuste para telas pequenas (Celular) */
        @media (max-width: 480px) {
            .botoes-acao { flex-direction: column; }
            .btn { padding: 12px; font-size: 12px; }
        }

        .loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MEU ESTOQUE 360°</h1>
        <div id="painel-lista">
            <div class="loading">Sincronizando estoque...</div>
        </div>
    </div>

    <script>
        const usuario = "xrujanx-dot";
        const repositorio = "meu-carro-360";

        async function carregar() {
            try {
                const response = await fetch(`https://api.github.com/repos/${usuario}/${repositorio}/contents/`);
                const itens = await response.json();
                const pastas = itens.filter(i => i.type === 'dir');
                const painel = document.getElementById('painel-lista');
                painel.innerHTML = '';

                const grupos = {};
                pastas.forEach(p => {
                    const partes = p.name.split('-');
                    const modelo = partes[0].toUpperCase();
                    const versao = partes[1] ? partes[1].toUpperCase() : "GERAL";
                    const nomeVersaoCompleto = `${modelo} ${versao}`;
                    if (!grupos[modelo]) grupos[modelo] = {};
                    if (!grupos[modelo][nomeVersaoCompleto]) grupos[modelo][nomeVersaoCompleto] = [];
                    grupos[modelo][nomeVersaoCompleto].push(p);
                });

                for (const [modelo, versoes] of Object.entries(grupos)) {
                    let totalNoModelo = 0;
                    for (let v in versoes) totalNoModelo += versoes[v].length;

                    const btn = document.createElement('button');
                    btn.className = 'modelo-btn';
                    btn.innerHTML = `${modelo} <span>(${totalNoModelo})</span>`;
                    
                    const divLista = document.createElement('div');
                    divLista.className = 'lista-carros';
                    
                    for (const [nomeVersao, carros] of Object.entries(versoes)) {
                        divLista.innerHTML += `<div class="versao-titulo">${nomeVersao}</div>`;
                        
                        carros.forEach(carro => {
                            const nomeExibicao = carro.name.replaceAll('-', ' ').replace('sem kit', '');
                            const linkCompleto = `https://${usuario}.github.io/${repositorio}/index.html?modelo=${carro.name}`;
                            
                            const item = document.createElement('div');
                            item.className = 'carro-item';
                            item.innerHTML = `
                                <div class="carro-info">${nomeExibicao}</div>
                                <div class="botoes-acao">
                                    <button class="btn btn-copiar" onclick="copiarLink('${linkCompleto}', this)">COPIAR LINK</button>
                                    <a href="${linkCompleto}" target="_blank" class="btn btn-ver">ABRIR 360°</a>
                                </div>
                            `;
                            divLista.appendChild(item);
                        });
                    }

                    btn.onclick = () => {
                        const estaAberto = divLista.style.display === 'block';
                        document.querySelectorAll('.lista-carros').forEach(l => l.style.display = 'none');
                        document.querySelectorAll('.modelo-btn').forEach(b => b.classList.remove('active'));
                        divLista.style.display = estaAberto ? 'none' : 'block';
                        if (!estaAberto) btn.classList.add('active');
                    };

                    painel.appendChild(btn);
                    painel.appendChild(divLista);
                }
            } catch (e) {
                document.getElementById('painel-lista').innerHTML = "Erro ao carregar pastas.";
            }
        }

        function copiarLink(url, botao) {
            navigator.clipboard.writeText(url).then(() => {
                const textoOriginal = botao.innerText;
                botao.innerText = "✓ COPIADO!";
                botao.style.background = "#155724";
                setTimeout(() => {
                    botao.innerText = textoOriginal;
                    botao.style.background = "#28a745";
                }, 2000);
            });
        }

        carregar();
    </script>
</body>
</html>
