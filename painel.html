<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel 360° Minimalista</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; font-size: 20px; margin-bottom: 20px; }

        .modelo-btn {
            width: 100%; background: #fff; border: 1px solid #ddd;
            padding: 12px 15px; margin-bottom: 5px; border-radius: 6px;
            text-align: left; font-size: 14px; font-weight: bold;
            color: #2c3e50; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
            text-transform: uppercase;
        }

        .lista-carros { 
            display: none; background: #fff; margin-bottom: 10px; 
            border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px;
        }

        .versao-titulo {
            background: #f8f9fa; padding: 5px 15px; font-size: 10px;
            font-weight: bold; color: #007bff; text-transform: uppercase;
        }

        /* ITEM ALINHADO (NOME + BOTÕES) */
        .carro-item { 
            padding: 8px 15px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }

        .carro-nome {
            font-size: 12px; text-transform: uppercase; font-weight: 500;
            color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            flex: 1; /* Faz o nome ocupar o espaço que sobrar */
        }

        .botoes-acao { display: flex; gap: 5px; flex-shrink: 0; }

        .btn {
            text-decoration: none; padding: 6px 10px; border-radius: 4px;
            font-size: 10px; font-weight: bold; cursor: pointer; border: none;
            transition: 0.2s; text-transform: uppercase; color: white;
        }

        .btn-copiar { background: #28a745; }
        .btn-ver { background: #007bff; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        .loading { text-align: center; padding: 30px; color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ESTOQUE 360°</h1>
        <div id="painel-lista">
            <div class="loading">Sincronizando...</div>
        </div>
    </div>

    <script>
        const usuario = "xrujanx-dot";
        const repositorio = "meu-carro-360";

        async function carregar() {
            try {
                const response = await fetch(`https://api.github.com/repos/${usuario}/${repositorio}/contents/`);
                const itens = await response.json();
                const pastas = itens.filter(i => i.type === 'dir');
                const painel = document.getElementById('painel-lista');
                painel.innerHTML = '';

                const grupos = {};
                pastas.forEach(p => {
                    const partes = p.name.split('-');
                    const modelo = partes[0].toUpperCase();
                    const versao = partes[1] ? partes[1].toUpperCase() : "GERAL";
                    const nomeVersaoCompleto = `${modelo} ${versao}`;
                    if (!grupos[modelo]) grupos[modelo] = {};
                    if (!grupos[modelo][nomeVersaoCompleto]) grupos[modelo][nomeVersaoCompleto] = [];
                    grupos[modelo][nomeVersaoCompleto].push(p);
                });

                for (const [modelo, versoes] of Object.entries(grupos)) {
                    let total = 0;
                    for (let v in versoes) total += versoes[v].length;

                    const btn = document.createElement('button');
                    btn.className = 'modelo-btn';
                    btn.innerHTML = `${modelo} <span style="font-size:10px; color:#999;">${total} itens</span>`;
                    
                    const divLista = document.createElement('div');
                    divLista.className = 'lista-carros';
                    
                    for (const [nomeVersao, carros] of Object.entries(versoes)) {
                        divLista.innerHTML += `<div class="versao-titulo">${nomeVersao}</div>`;
                        
                        carros.forEach(carro => {
                            const nomeLimpo = carro.name.split('-').slice(2).join(' ').replace('sem kit', '');
                            const link = `https://${usuario}.github.io/${repositorio}/index.html?modelo=${carro.name}`;
                            
                            const item = document.createElement('div');
                            item.className = 'carro-item';
                            item.innerHTML = `
                                <div class="carro-nome">${nomeLimpo || 'PADRÃO'}</div>
                                <div class="botoes-acao">
                                    <button class="btn btn-copiar" onclick="copiarLink('${link}', this)">Copiar</button>
                                    <a href="${link}" target="_blank" class="btn btn-ver">Abrir</a>
                                </div>
                            `;
                            divLista.appendChild(item);
                        });
                    }

                    btn.onclick = () => {
                        const aberto = divLista.style.display === 'block';
                        document.querySelectorAll('.lista-carros').forEach(l => l.style.display = 'none');
                        divLista.style.display = aberto ? 'none' : 'block';
                    };

                    painel.appendChild(btn);
                    painel.appendChild(divLista);
                }
            } catch (e) { painel.innerHTML = "Erro ao carregar."; }
        }

        function copiarLink(url, btn) {
            navigator.clipboard.writeText(url).then(() => {
                const original = btn.innerText;
                btn.innerText = "✓";
                btn.style.background = "#155724";
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.background = "#28a745";
                }, 1500);
            });
        }
        carregar();
    </script>
</body>
</html>
