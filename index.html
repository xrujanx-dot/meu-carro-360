<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Car View - Pro Zoom</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #FFFFFF;
            overflow: hidden; font-family: sans-serif;
        }

        .container-360 {
            width: 95%; max-width: 1000px;
            position: relative; touch-action: none; 
            display: flex; flex-direction: column; align-items: center;
        }

        #nome-veiculo {
            text-align: center; font-size: 18px; font-weight: bold;
            color: #333; margin-bottom: 10px; text-transform: uppercase;
        }

        .wrapper-img {
            width: 100%; overflow: hidden;
            display: flex; justify-content: center;
            cursor: grab;
        }
        .wrapper-img:active { cursor: grabbing; }

        #carro-img {
            width: 100%; height: auto;
            user-select: none; -webkit-user-drag: none;
            display: block; transform-origin: center;
            transition: transform 0.1s ease-out;
        }

        .instrucoes {
            position: absolute; bottom: -40px; left: 50%;
            transform: translateX(-50%); color: #666;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap;
        }

        .zoom-container {
            position: absolute; right: -20px; top: 50%;
            transform: translateY(-50%); display: flex;
            flex-direction: column; align-items: center; gap: 10px; z-index: 10;
        }

        input[type=range].zoom-slider {
            -webkit-appearance: slider-vertical;
            width: 8px; height: 150px; cursor: pointer;
        }

        @media (max-width: 600px) { .zoom-container { right: 5px; } }
    </style>
</head>
<body>

    <div class="container-360" id="viewer">
        <div id="nome-veiculo"></div> 
        
        <div class="wrapper-img" id="drag-area">
            <img id="carro-img" src="" alt="Carro 360">
        </div>

        <div class="zoom-container">
            <label style="font-size:10px; color:#999;">ZOOM</label>
            <input type="range" class="zoom-slider" id="zoom-ctrl" min="1" max="3" step="0.1" value="1">
        </div>

        <div class="instrucoes" id="txt-instrucao">◄ Arraste para Girar ►</div>
    </div>

    <script>
        const img = document.getElementById('carro-img');
        const zoomCtrl = document.getElementById('zoom-ctrl');
        const instrucao = document.getElementById('txt-instrucao');
        
        const totalImagens = 30; 
        let indiceAtual = 0;
        let isDragging = false;
        
        // Variáveis de controle de posição
        let startX = 0, startY = 0;
        let posX = 0, posY = 0; // Posição atual do arraste (PAN)
        let zoomAtual = 1;
        let sensibilidadeGiro = 10; 

        const urlParams = new URLSearchParams(window.location.search);
        const pastaCarro = urlParams.get('modelo') || "pulse-drive-1.3-preto-vulcano-sem-kit";

        document.getElementById('nome-veiculo').innerText = pastaCarro.replaceAll('-', ' ').replace('sem kit', '');
        img.src = `${pastaCarro}/00.webp`;

        // --- LÓGICA DO ZOOM ---
        zoomCtrl.addEventListener('input', (e) => {
            zoomAtual = parseFloat(e.target.value);
            if (zoomAtual === 1) {
                posX = 0; posY = 0; // Reseta posição ao voltar ao normal
                instrucao.innerText = "◄ Arraste para Girar ►";
            } else {
                instrucao.innerText = "Modo Detalhes: Arraste para navegar";
            }
            aplicarTransform();
        });

        function aplicarTransform() {
            img.style.transform = `scale(${zoomAtual}) translate(${posX / zoomAtual}px, ${posY / zoomAtual}px)`;
        }

        // --- EVENTOS DE MOVIMENTO ---
        const iniciar = (e) => {
            if (e.target.id === 'zoom-ctrl') return;
            isDragging = true;
            const event = e.touches ? e.touches[0] : e;
            startX = event.pageX;
            startY = event.pageY;
        };

        const mover = (e) => {
            if (!isDragging) return;
            if(e.cancelable) e.preventDefault();

            const event = e.touches ? e.touches[0] : e;
            const deltaX = event.pageX - startX;
            const deltaY = event.pageY - startY;

            if (zoomAtual > 1) {
                // MODO PAN (ARRASTAR FOTO)
                posX += deltaX;
                posY += deltaY;
                startX = event.pageX;
                startY = event.pageY;
                aplicarTransform();
            } else {
                // MODO GIRO
                const framesParaPular = Math.floor(deltaX / sensibilidadeGiro);
                if (framesParaPular !== 0) {
                    indiceAtual = (indiceAtual + framesParaPular + totalImagens) % totalImagens;
                    const nomeFormatado = Math.floor(indiceAtual).toString().padStart(2, '0');
                    img.src = `${pastaCarro}/${nomeFormatado}.webp`;
                    startX = event.pageX;
                }
            }
        };

        const parar = () => { isDragging = false; };

        // Ouvintes de eventos
        const dragArea = document.getElementById('drag-area');
        dragArea.addEventListener('mousedown', iniciar);
        window.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', parar);
        
        dragArea.addEventListener('touchstart', iniciar, {passive: false});
        window.addEventListener('touchmove', mover, {passive: false});
        window.addEventListener('touchend', parar);

        // Pré-carregamento (Manteve igual)
        const precarregar = () => {
            for (let i = 0; i < totalImagens; i++) {
                const nome = i.toString().padStart(2, '0');
                const link = document.createElement('link');
                link.rel = 'preload'; link.as = 'image';
                link.href = `${pastaCarro}/${nome}.webp`;
                document.head.appendChild(link);
            }
        };
        precarregar();
    </script>
</body>
</html>
