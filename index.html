<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Car View - Debug</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #FFFFFF; overflow: hidden; }
        .container-360 { width: 95%; max-width: 1000px; position: relative; }
        #carro-img { width: 100%; height: auto; display: block; background: #f0f0f0; min-height: 300px; }
    </style>
</head>
<body>

    <div class="container-360" id="viewer">
        <img id="carro-img" src="" alt="Carregando...">
    </div>

    <script>
        const img = document.getElementById('carro-img');
        const urlParams = new URLSearchParams(window.location.search);
        
        // Pega o modelo da URL ou usa o preto como padrão
        const modelo = urlParams.get('modelo') || "pulse-drive-1.3-preto-vulcano-sem-kit";
        
        // MONTAGEM DO CAMINHO
        const caminhoFoto = `./${modelo}/00.webp`;
        
        console.log("Tentando carregar:", caminhoFoto);
        img.src = caminhoFoto;

        // SE DER ERRO NA IMAGEM, VAI APARECER UM ALERTA
        img.onerror = function() {
            alert("ERRO: Não encontrei a foto em: " + caminhoFoto + 
                  "\n\nVerifique se:\n1. O nome da pasta no GitHub está idêntico.\n2. A foto 00.webp está lá dentro.");
        };

        // --- Lógica de Giro (Simplificada para teste) ---
        let isDragging = false;
        let startX = 0;
        let indiceAtual = 0;

        const mover = (e) => {
            if (!isDragging) return;
            const xAtual = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const diff = xAtual - startX;
            if (Math.abs(diff) > 10) {
                indiceAtual = (diff > 0) ? (indiceAtual + 1) % 30 : (indiceAtual - 1 + 30) % 30;
                const nome = indiceAtual.toString().padStart(2, '0');
                img.src = `./${modelo}/${nome}.webp`;
                startX = xAtual;
            }
        };

        viewer.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', mover);
        viewer.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].pageX; });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', mover, {passive: false});
    </script>
</body>
</html>
