<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Car View</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; 
            background: #FFFFFF;
            overflow: hidden; font-family: sans-serif;
        }

        .container-360 {
            width: 95%; max-width: 1000px;
            position: relative; cursor: grab;
            touch-action: none; 
            display: flex; flex-direction: column; align-items: center;
        }

        .container-360:active { cursor: grabbing; }

        #nome-veiculo {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Container da imagem para o zoom não cortar as bordas */
        .wrapper-img {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #carro-img {
            width: 100%; height: auto;
            user-select: none;
            -webkit-user-drag: none;
            display: block;
            transition: transform 0.1s ease-out; /* Suaviza o zoom */
            transform-origin: center;
        }

        .instrucoes {
            position: absolute; bottom: -40px; left: 50%;
            transform: translateX(-50%); color: #666;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap;
        }

        /* BARRA DE ZOOM VERTICAL */
        .zoom-container {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .zoom-container label {
            font-size: 10px;
            font-weight: bold;
            color: #999;
            text-transform: uppercase;
        }

        input[type=range].zoom-slider {
            writing-mode: bt-lr; /* Suporte para navegadores antigos */
            -webkit-appearance: slider-vertical; /* Barra vertical */
            width: 8px;
            height: 150px;
            padding: 0 5px;
            cursor: pointer;
        }

        /* Ajuste para mobile se a barra ficar muito fora */
        @media (max-width: 600px) {
            .zoom-container { right: 5px; }
        }
    </style>
</head>
<body>

    <div class="container-360" id="viewer">
        <div id="nome-veiculo"></div> 
        
        <div class="wrapper-img">
            <img id="carro-img" src="" alt="Carro 360">
        </div>

        <div class="zoom-container">
            <label>Zoom</label>
            <input type="range" class="zoom-slider" id="zoom-ctrl" min="1" max="2.5" step="0.1" value="1">
        </div>

        <div class="instrucoes">◄ Arraste para Girar ►</div>
    </div>

    <script>
        const img = document.getElementById('carro-img');
        const viewer = document.getElementById('viewer');
        const zoomCtrl = document.getElementById('zoom-ctrl');
        
        const totalImagens = 30; 
        let indiceAtual = 0;
        let isDragging = false;
        let startX = 0;
        let sensibilidade = 10; 

        const urlParams = new URLSearchParams(window.location.search);
        const pastaCarro = urlParams.get('modelo') || "pulse-drive-1.3-preto-vulcano-sem-kit";

        let nomeExibicao = pastaCarro.replaceAll('-', ' ');
        nomeExibicao = nomeExibicao.replace('sem kit', ''); 
        document.getElementById('nome-veiculo').innerText = nomeExibicao;

        img.src = `${pastaCarro}/00.webp`;

        // LÓGICA DO ZOOM
        zoomCtrl.addEventListener('input', (e) => {
            const nivelZoom = e.target.value;
            img.style.transform = `scale(${nivelZoom})`;
        });

        const precarregar = () => {
            for (let i = 0; i < totalImagens; i++) {
                const nome = i.toString().padStart(2, '0');
                const link = document.createElement('link');
                link.rel = 'preload'; link.as = 'image';
                link.href = `${pastaCarro}/${nome}.webp`;
                document.head.appendChild(link);
            }
        };
        precarregar();

        function atualizarFrame(deltaX) {
            const framesParaPular = Math.floor(deltaX / sensibilidade);
            if (framesParaPular !== 0) {
                let novoIndice = indiceAtual + framesParaPular;
                while (novoIndice >= totalImagens) novoIndice -= totalImagens;
                while (novoIndice < 0) novoIndice += totalImagens;
                const nomeFormatado = novoIndice.toString().padStart(2, '0');
                img.src = `${pastaCarro}/${nomeFormatado}.webp`;
                indiceAtual = novoIndice;
                return true;
            }
            return false;
        }

        const iniciar = (e) => {
            // Se o toque for no controle de zoom, não inicia o giro
            if (e.target.id === 'zoom-ctrl') return;
            isDragging = true;
            startX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
        };
        const parar = () => { isDragging = false; };
        const mover = (e) => {
            if (!isDragging) return;
            if(e.cancelable) e.preventDefault();
            const xAtual = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const diferenca = xAtual - startX;
            if (atualizarFrame(diferenca)) { startX = xAtual; }
        };

        viewer.addEventListener('mousedown', iniciar);
        window.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', parar);
        viewer.addEventListener('touchstart', iniciar, {passive: false});
        window.addEventListener('touchmove', mover, {passive: false});
        window.addEventListener('touchend', parar);
    </script>
</body>
</html>
