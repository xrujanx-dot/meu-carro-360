<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Car View - Pro Experience</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #FFFFFF;
            overflow: hidden; font-family: sans-serif;
        }

        .container-360 {
            width: 95%; max-width: 1000px;
            position: relative; touch-action: none; 
            display: flex; flex-direction: column; align-items: center;
        }

        #nome-veiculo {
            text-align: center; font-size: 18px; font-weight: bold;
            color: #333; margin-bottom: 10px; text-transform: uppercase;
        }

        .wrapper-img {
            width: 100%; overflow: hidden;
            display: flex; justify-content: center;
            cursor: grab;
        }
        .wrapper-img:active { cursor: grabbing; }

        #carro-img {
            width: 100%; height: auto;
            user-select: none; -webkit-user-drag: none;
            display: block; transform-origin: center;
            transition: transform 0.1s ease-out;
        }

        .instrucoes {
            position: absolute; bottom: -40px; left: 50%;
            transform: translateX(-50%); color: #666;
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            white-space: nowrap; background: rgba(255,255,255,0.8); padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container-360" id="viewer">
        <div id="nome-veiculo"></div> 
        
        <div class="wrapper-img" id="drag-area">
            <img id="carro-img" src="" alt="Carro 360">
        </div>

        <div class="instrucoes" id="txt-instrucao">◄ Gire ou use o Scroll/Pinça para Zoom ►</div>
    </div>

    <script>
        const img = document.getElementById('carro-img');
        const instrucao = document.getElementById('txt-instrucao');
        const totalImagens = 30; 
        let indiceAtual = 0;
        let isDragging = false;

        // Variáveis de Controle de Zoom e Posição
        let zoomAtual = 1;
        let posX = 0, posY = 0;
        let startX = 0, startY = 0;
        let initialPinchDist = 0;
        let sensibilidadeGiro = 12;

        // Captura o modelo da URL
        const urlParams = new URLSearchParams(window.location.search);
        const pastaCarro = urlParams.get('modelo') || "pulse-drive-1.3-preto-vulcano-sem-kit";

        // Título formatado
        document.getElementById('nome-veiculo').innerText = pastaCarro.replaceAll('-', ' ').replace('sem kit', '');
        img.src = `${pastaCarro}/00.webp`;

        // Função para aplicar transformações de Zoom e Arraste
        function aplicarTransform() {
            // Limita o zoom entre 1x e 4x
            zoomAtual = Math.min(Math.max(1, zoomAtual), 4);
            
            if (zoomAtual <= 1.05) { 
                zoomAtual = 1; posX = 0; posY = 0; 
                instrucao.innerText = "◄ Gire ou use o Scroll/Pinça para Zoom ►";
            } else {
                instrucao.innerText = "Modo Detalhes: Arraste para navegar";
            }
            
            img.style.transform = `scale(${zoomAtual}) translate(${posX / zoomAtual}px, ${posY / zoomAtual}px)`;
        }

        // Zoom via Scroll do Mouse (PC)
        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                const delta = e.deltaY > 0 ? -0.2 : 0.2;
                zoomAtual += delta;
                aplicarTransform();
            }
        }, { passive: false });

        // Cálculo de distância para Pinça (Mobile)
        const getDist = (t1, t2) => Math.hypot(t1.pageX - t2.pageX, t1.pageY - t2.pageY);

        // Início da interação (Mouse ou Toque)
        const iniciar = (e) => {
            isDragging = true;
            if (e.touches && e.touches.length === 2) {
                initialPinchDist = getDist(e.touches[0], e.touches[1]);
            } else {
                const event = e.touches ? e.touches[0] : e;
                startX = event.pageX;
                startY = event.pageY;
            }
        };

        // Movimentação (Giro ou Arraste da foto)
        const mover = (e) => {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();

            // Zoom de Pinça com 2 dedos
            if (e.touches && e.touches.length === 2) {
                const currentDist = getDist(e.touches[0], e.touches[1]);
                const diff = currentDist / initialPinchDist;
                zoomAtual *= diff;
                initialPinchDist = currentDist;
                aplicarTransform();
                return;
            }

            const event = e.touches ? e.touches[0] : e;
            const deltaX = event.pageX - startX;
            const deltaY = event.pageY - startY;

            if (zoomAtual > 1.1) {
                // Modo PAN: Arrastar a foto aproximada
                posX += deltaX;
                posY += deltaY;
                startX = event.pageX;
                startY = event.pageY;
                aplicarTransform();
            } else {
                // Modo GIRO: Trocar as imagens
                const frames = Math.floor(deltaX / sensibilidadeGiro);
                if (frames !== 0) {
                    indiceAtual = (indiceAtual + frames + totalImagens) % totalImagens;
                    const nomeFormatado = Math.floor(indiceAtual).toString().padStart(2, '0');
                    img.src = `${pastaCarro}/${nomeFormatado}.webp`;
                    startX = event.pageX;
                }
            }
        };

        const parar = () => { 
            isDragging = false; 
            initialPinchDist = 0; 
        };

        // Listeners
        const area = document.getElementById('drag-area');
        area.addEventListener('mousedown', iniciar);
        window.addEventListener('mousemove', mover);
        window.addEventListener('mouseup', parar);
        
        area.addEventListener('touchstart', iniciar, {passive: false});
        window.addEventListener('touchmove', mover, {passive: false});
        window.addEventListener('touchend', parar);

        // Pré-carregamento das imagens
        const precarregar = () => {
            for (let i = 0; i < totalImagens; i++) {
                const link = document.createElement('link');
                link.rel = 'preload'; link.as = 'image';
                link.href = `${pastaCarro}/${i.toString().padStart(2, '0')}.webp`;
                document.head.appendChild(link);
            }
        };
        precarregar();
    </script>
</body>
</html>
